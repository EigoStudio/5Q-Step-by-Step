<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarah Asks for Help</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 26px;
            color: #0f172a;
            margin-bottom: 6px;
        }

        header p {
            font-size: 14px;
            color: #64748b;
        }

        .game-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        @media (min-width: 992px) {
            .game-layout {
                grid-template-columns: 1.3fr 1fr;
            }
        }

        .board-container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            width: 100%;
            background: #f1f5f9;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }

        .space {
            aspect-ratio: 1;
            background: #ffffff;
            border: 2px solid #cbd5e1;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            position: relative;
            transition: all 0.2s ease;
        }

        .space.pink-yn {
            background: #fce7f3;
            border-color: #fbcfe8;
            color: #9d174d;
        }
        .space.orange-mc {
            background: #ffedd5;
            border-color: #fed7aa;
            color: #c2410c;
        }
        .space.start-node {
            background: #dbeafe;
            border-color: #93c5fd;
            color: #1e40af;
        }
        .space.goal-node {
            background: #dcfce7;
            border-color: #86efac;
            color: #166534;
        }

        .space.pink-yn::after {
            content: 'Y/N';
            position: absolute;
            bottom: 4px;
            font-size: 9px;
            opacity: 0.7;
        }
        .space.orange-mc::after {
            content: 'A/B/C';
            position: absolute;
            bottom: 4px;
            font-size: 9px;
            opacity: 0.7;
        }

        .token {
            width: 26px;
            height: 26px;
            background: #ef4444;
            border: 3px solid #ffffff;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            animation: hop 0.4s infinite alternate;
        }

        @keyframes hop {
            from { transform: translateY(0); }
            to { transform: translateY(-6px); }
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .widget {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .widget h2 {
            font-size: 18px;
            color: #334155;
            margin-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 8px;
        }

        .dice-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .dice-display {
            width: 70px;
            height: 70px;
            background: #ffffff;
            border: 3px solid #334155;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .dice-display.spinning {
            animation: spin 0.3s infinite linear;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        button {
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
        }

        button:hover { background-color: #2563eb; }
        button:active { transform: scale(0.98); }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .graphic-container {
            display: none;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 1 / 1; /* ★正方形比率をキープ */
            background: #f1f5f9; 
            border-radius: 12px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
        }

        .graphic-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ★画像を絶対に削らず、丸々全体を綺麗に映し出す（隙間許容） */
        }

        .quiz-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            width: 100%;
        }

        .audio-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .audio-btn:hover {
            background-color: #2563eb;
            transform: scale(1.05);
        }

        .quiz-wrapper { display: none; }
        .quiz-wrapper.active { display: block; }

        .prompt-text {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 18px;
            color: #0f172a;
            text-align: center;
            flex-grow: 1;
            padding: 0 10px;
        }

        .choices-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-btn {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            color: #334155;
            text-align: center;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
        }

        .choice-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .choice-btn.correct { background: #dcfce7; border-color: var(--success-color); color: #166534; }
        .choice-btn.incorrect { background: #fee2e2; border-color: var(--danger-color); color: #991b1b; }

        .alert-banner {
            margin-top: 14px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            min-height: 24px;
        }
        .alert-banner.correct { color: var(--success-color); }
        .alert-banner.incorrect { color: var(--danger-color); }

        .info-text { font-size: 15px; line-height: 1.6; color: #475569; }

        .modal-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            z-index: 100;
            justify-content: center; align-items: center;
        }
        .modal-screen.active { display: flex; }
        .modal-body {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .modal-body h2 { color: var(--success-color); font-size: 32px; margin-bottom: 16px; }
        .modal-body p { margin-bottom: 28px; font-size: 16px; color: #475569; }
    </style>
</head>
<body>

        <p>Look at the picture, click the speaker to listen, and answer!</p>
    </header>

    <div class="game-layout">
        <main class="board-container">
            <div class="board-grid" id="main-board"></div>

                    <button class="audio-btn" onclick="speakQuestion()" title="Listen to the question">

                </div>
                
                <div class="graphic-container" id="visual-frame">
                    <img src="" id="quiz-image" alt="Scene">

                <div class="prompt-text" id="prompt-element">Loading...</div>
                <div class="choices-stack" id="choices-element"></div>
                <div class="alert-banner" id="alert-element"></div>
                <button id="continue-btn" style="display:none; margin-top:16px;" onclick="resumeAdventure()">Next ➔</button>
            </div>

            <div class="widget">
                <h2>📊 Space</h2>

        </aside>
    </div>

            <button onclick="restartAdventure()">Play Again</button>
        </div>
    </div>

        function initializeBoardLayout() {
            const boardGrid = document.getElementById('main-board');
            boardGrid.innerHTML = '';
            
            const totalRows = 5;
            const totalCols = 8;
            let counter = 1;
            let matrix = Array(totalRows).fill().map(() => Array(totalCols).fill(0));

            for (let r = 0; r < totalRows; r++) {
                let trackingRow = totalRows - 1 - r;
                if (r % 2 === 0) {
                    for (let c = 0; c < totalCols; c++) matrix[trackingRow][c] = counter++;
                } else {
                    for (let c = totalCols - 1; c >= 0; c--) matrix[trackingRow][c] = counter++;
                }
            }

            for (let r = 0; r < totalRows; r++) {
                for (let c = 0; c < totalCols; c++) {
                    const idNum = matrix[r][c];
                    const spaceCell = document.createElement('div');
                    spaceCell.className = 'space';
                    spaceCell.id = `node-${idNum}`;
                    spaceCell.innerText = idNum;

                    if (idNum === 1) {
                        spaceCell.classList.add('start-node');
                        spaceCell.innerHTML = `1<br><span style="font-size:8px;font-weight:800;">START</span>`;
                    } else if (idNum === MAX_STEPS) {
                        spaceCell.classList.add('goal-node');
                        spaceCell.innerHTML = `${MAX_STEPS}<br><span style="font-size:8px;font-weight:800;">GOAL</span>`;
                    } else if (curriculumDatabase[idNum]) {
                        const qType = curriculumDatabase[idNum].type;
                        if (qType === "pink") spaceCell.classList.add('pink-yn');
                        if (qType === "orange") spaceCell.classList.add('orange-mc');
                    }

                    boardGrid.appendChild(spaceCell);
                }
            }
            refreshPlayerPosition();
        }

        function refreshPlayerPosition() {
            const oldToken = document.querySelector('.token');
            if (oldToken) oldToken.remove();

            const targetCell = document.getElementById(`node-${currentSpace}`);
            if (targetCell) {
                const tokenElement = document.createElement('div');
                tokenElement.className = 'token';
                targetCell.appendChild(tokenElement);
            }
            document.getElementById('track-space').innerText = currentSpace;
        }

        function executeRoll() {
            if (rollingInProgress) return;
            rollingInProgress = true;
            
            const btn = document.getElementById('trigger-btn');
            const dice = document.getElementById('dice-element');
            btn.disabled = true;
            dice.classList.add('spinning');

            let loops = 0;
            const cycle = setInterval(() => {
                dice.innerText = Math.floor(Math.random() * 6) + 1;
                loops++;

                if (loops > 12) {
                    clearInterval(cycle);
                    dice.classList.remove('spinning');
                    
                    const actualRoll = Math.floor(Math.random() * 6) + 1;
                    dice.innerText = actualRoll;

                    setTimeout(() => {
                        advancePlayer(actualRoll);
                        rollingInProgress = false;
                    }, 400);
                }
            }, 60);
        }

        function advancePlayer(steps) {
            currentSpace = Number(currentSpace) + Number(steps);
            const btn = document.getElementById('trigger-btn');
            
            if (currentSpace >= MAX_STEPS) {
                currentSpace = MAX_STEPS;
                refreshPlayerPosition();
                document.getElementById('track-log').innerText = "GOAL!";
                currentQuestionText = ""; 
                setTimeout(() => {
                    document.getElementById('victory-modal').classList.add('active');
                }, 800);
                return;
            }

            refreshPlayerPosition();
            
            const currentPuzzle = curriculumDatabase[currentSpace];
            if (currentPuzzle) {
                document.getElementById('track-log').innerText = `Space ${currentSpace}: Answer the question!`;
                document.getElementById('action-terminal').style.display = 'none';
                deployChallengePanel(currentPuzzle);
            } else {
                document.getElementById('track-log').innerText = `Safe! Roll again.`;
                currentQuestionText = "";
                btn.disabled = false; 
            }
        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function speakQuestion() {
            if (!currentQuestionText) return;
            window.speechSynthesis.cancel(); 
            const utterance = new SpeechSynthesisUtterance(currentQuestionText);
            utterance.lang = 'en-US';
            utterance.rate = 0.9; 
            window.speechSynthesis.speak(utterance);
        }

        function deployChallengePanel(puzzle) {
            const station = document.getElementById('challenge-station');
            const heading = document.getElementById('quiz-heading');
            const frame = document.getElementById('visual-frame');
            const imgElement = document.getElementById('quiz-image');
            const prompt = document.getElementById('prompt-element');
            const stack = document.getElementById('choices-element');
            const banner = document.getElementById('alert-element');
            const forwardBtn = document.getElementById('continue-btn');

            station.classList.add('active');
            prompt.innerText = puzzle.question;
            currentQuestionText = puzzle.question; 
            stack.innerHTML = '';
            banner.innerText = '';
            banner.className = 'alert-banner';
            forwardBtn.style.display = 'none';
            selectedChoice = false;

            if (puzzle.type === "pink") {
                heading.innerText = "🌸 Yes / No";
            } else {
                heading.innerText = "🍊 ABC Quiz";
            }

            if (puzzle.pic && puzzle.pic !== "") {
                frame.style.display = 'block';
                imgElement.src = puzzle.pic;
            } else {
                frame.style.display = 'none';
            }

            const shuffledOptions = shuffleArray(puzzle.options);

            shuffledOptions.forEach(opt => {
                const optBtn = document.createElement('button');
                optBtn.className = 'choice-btn';
                optBtn.innerText = opt.text;
                optBtn.onclick = () => evaluateChoice(optBtn, opt.isCorrect);
                stack.appendChild(optBtn);
            });
        }

        function evaluateChoice(targetBtn, isCorrect) {
            if (selectedChoice) return;

            const allChoices = document.querySelectorAll('.choice-btn');
            allChoices.forEach(b => b.disabled = true);

            const banner = document.getElementById('alert-element');
            const forwardBtn = document.getElementById('continue-btn');

            if (isCorrect) {
                targetBtn.classList.add('correct');
                banner.innerText = "✨ Correct!";
                banner.className = "alert-banner correct";
                forwardBtn.style.display = 'block';
                selectedChoice = true;
            } else {
                targetBtn.classList.add('incorrect');
                banner.innerText = "⚡ Try again!";
                banner.className = "alert-banner incorrect";
                
                setTimeout(() => {
                    allChoices.forEach(b => {
                        if (!b.classList.contains('correct')) b.disabled = false;
                    });
                    targetBtn.classList.remove('incorrect');
                    banner.innerText = "";
                }, 1200);
            }
        }

        function resumeAdventure() {
            document.getElementById('challenge-station').classList.remove('active');
            document.getElementById('action-terminal').style.display = 'block';
            document.getElementById('trigger-btn').disabled = false; 
            document.getElementById('track-log').innerText = "Good job! Roll again.";
            currentQuestionText = ""; 
        }

        function restartAdventure() {
            currentSpace = 1;
            rollingInProgress = false;
            selectedChoice = false;
            document.getElementById('victory-modal').classList.remove('active');
            document.getElementById('challenge-station').classList.remove('active');
            document.getElementById('action-terminal').style.display = 'block';
            document.getElementById('trigger-btn').disabled = false;
            document.getElementById('dice-element').innerText = "1";
            document.getElementById('track-log').innerText = "Roll to start!";
            currentQuestionText = "";
            initializeBoardLayout();
        }

        window.onload = initializeBoardLayout;
    </script>
</body>
</html>
