<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step by Step Towards EIKEN Grade 5 p58 - Present Continuous</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f0; /* 全体の背景（優しい薄いグリーン・ホワイト系） */
            --main-text: #2b2b2b; /* メインの文字（ダークグレー） */
            --box-bg: #ffffff; /* 問題カードの白 */
            --accent-yellow: #fff3cd; /* ヒントなどの薄いイエロー */
            --btn-green: #e2f0d9; /* 選択肢の薄いグリーン */
            --btn-hover: #c5e0b4; /* 選択肢ホバー */
            --brown-text: #7f6000; /* ブラウンの文字 */
        }

        body {
            font-family: 'Andika', 'Kosugi Maru', sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--box-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border: 4px solid #d9e1f2;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            color: var(--brown-text);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed var(--brown-text);
            padding-bottom: 12px;
        }

        /* 日本語と英語のバランス調整 */
        .ja-text {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .en-text {
            font-size: 32px;
            font-weight: 700;
            color: #1f4e79;
            margin: 30px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        .blank {
            color: #ffc000;
            border-bottom: 3px solid #ffc000;
            padding: 0 15px;
        }

        /* シンプルなアイコン風イラストのエリア */
        .icon-container {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 選択肢ボタンエリア：横並び */
        .choices {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            background-color: var(--btn-green);
            border: 2px solid #a8d08d;
            border-radius: 14px;
            padding: 14px 30px;
            font-size: 24px;
            font-family: 'Andika', sans-serif;
            font-weight: bold;
            color: var(--main-text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            flex: 1;
            min-width: 200px;
            max-width: 280px;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }

        /* フィードバックエリア */
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 14px;
            display: none;
            font-size: 20px;
            font-weight: bold;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .explanation {
            font-size: 17px;
            font-weight: normal;
            margin-top: 12px;
            color: var(--main-text);
            line-height: 1.6;
        }

        /* 次へボタン */
        .next-btn {
            display: none;
            margin: 25px auto 0 auto;
            background-color: #fff2cc;
            border: 2px solid #ffd966;
            color: var(--brown-text);
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #ffe599;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-title {
            font-size: 32px;
            color: var(--brown-text);
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h1 id="title">Step by Step Towards EIKEN Grade 5 p58 - いま〜しているところ（現在進行形）</h1>
        
        <div class="icon-container" id="icon">🧹</div>

        <div class="ja-text" id="question-ja">
            お部屋がちょっと散らかっちゃった。<br>
            「部屋をきれいにおそうじしているところだよ」という言葉を選ぼう！
        </div>

        <div class="en-text" id="question-en">
            I am <span class="blank" id="blank-word">？</span> the room.
        </div>

        <div class="choices" id="choices-container">
        </div>

        <div class="feedback" id="feedback-box">
            <span id="feedback-title"></span>
            <div class="explanation" id="explanation-text"></div>
        </div>

        <button class="next-btn" id="next-button" onclick="nextQuestion()">NEXT ➔</button>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="result-title">🎉 Perfect! Excellent job! 🎉</div>
        <div class="ja-text" style="text-align: center; font-size: 22px;">You did it! You are super awesome!</div>
        <button class="next-btn" style="display:inline-block; margin-top:25px;" onclick="resetQuiz()">TRY AGAIN</button>
    </div>
</div>

<script>
const quizData = [
    {
        icon: "🧹",
        ja: "お部屋がちょっと散らかっちゃった。<br>「部屋をきれいにおそうじしているところだよ」という言葉を選ぼう！",
        en: "I am <span class='blank'>？</span> the room.",
        choices: ["cleaning", "making", "buying"],
        answer: "cleaning",
        info: "「そうじしている」は clean に ing をつけた <b>cleaning</b> を使います。am ＋ ing で「いま〜しているところ」という意味になるよ！"
    },
    {
        icon: "🌧️",
        ja: "窓の外を見たら、あめの音がザーザー！<br>英語で「いま雨がふっているよ」っていうとき、さいしょに置く主語（しゅご）はどれかな？",
        en: "<span class='blank'>？</span> is raining.",
        choices: ["He", "It", "She"],
        answer: "It",
        info: "英語で「雨がふっている」「晴れている」のようにお天気のハナシをするときは、いつも <b>It</b> を主語にする特別なルールがあります！"
    },
    {
        icon: "🍪",
        ja: "キッチンからいいにおい！オーブンでサクサクのクッキーを「作っているところ」だよ。<br>空欄に入る言葉を選んでね。",
        en: "I am <span class='blank'>？</span> cookies.",
        choices: ["wearing", "helping", "making"],
        answer: "making",
        info: "make（作る）に ing をつけるときは、さいごの e を消して <b>making</b> にするよ。I am making cookies. で「わたしはクッキーを作っているところです」になります。"
    },
   {
        icon: "👒",
        ja: "今日はお外がまぶしいから、かわいい帽子を「かぶっている」よ！<br>「身につけているところ」という言葉はどれ？",
        en: "I am <span class='blank'>？</span> a hat.",
        choices: ["wearing", "doing", "watering"],
        answer: "wearing",
        info: "wear（身につける）に ing をつけた <b>wearing</b> を使います。服を「着ている」、帽子を「かぶっている」、メガネを「かけている」ときも、ぜんぶこれ一つでOK！"
    },
    {
        icon: "🌸",
        ja: "お庭のお花たちが、のどがかわいたって言っているよ。<br>お花に「お水をあげているところ」という言葉を選ぼう！",
        en: "I am <span class='blank'>？</span> the flowers.",
        choices: ["cleaning", "watering", "buying"],
        answer: "watering",
        info: "water は「水」だけでなく「お水をあげる」という動きの言葉にもなります。ing をつけて <b>watering</b> にすると「お水をあげているところ」になります！"
    },
    {
        icon: "✏️",
        ja: "学校から帰ってきたら、夕ごはんの前に「しゅくだいをやっているところ」だよ！<br>あてはまるフレーズを選んでね。",
        en: "I am <span class='blank'>？</span>.",
        choices: ["doing my homework", "taking a bath", "helping an old woman"],
        answer: "doing my homework",
        info: "「宿題をしているところ」は do に ing をつけて <b>doing my homework</b> と言います。am doing で「いまやっている真っ最中！」というニュアンスが出せます。"
    },
    {
        icon: "🛁",
        ja: "いっぱい遊んで、お風呂で足をのばしてリラックス！<br>「いまお風呂に入っている（湯ぶねにつかっている）ところだよ」というフレーズはどれかな？",
        en: "I am <span class='blank'>？</span> now.",
        choices: ["making cookies", "taking a bath", "cleaning the room"],
        answer: "taking a bath",
        info: "take に ing をつけるときは e を消して <b>taking</b> にします。<b>taking a bath</b> now で「いまお風呂に入っているところです」という意味になります。"
    },
    {
        icon: "👜",
        ja: "お買い物にやってきたよ！お店で可愛いハンドバッグを「買っているところ」だよ。<br>空欄に入る言葉はどれかな？",
        en: "I am <span class='blank'>？</span> a purse.",
        choices: ["buying", "wearing", "helping"],
        answer: "buying",
        info: "「買っているところ」は buy に ing をつけた <b>buying</b> を使います。アメリカなどではハンドバッグや肩掛けカバンのことを <b>purse</b> と言うんだよ（お財布は wallet）。I am buying a purse. で「わたしはハンドバッグを買っているところです」となります。"
    },
    {
        icon: "👵",
        ja: "お荷物がいっぱいで大変そうなおばあちゃんがいるよ。優しく「てつだっているところ」だよ！<br>空欄に入る言葉を選ぼう。",
        en: "I am <span class='blank'>？</span> an old woman.",
        choices: ["making", "helping", "watering"],
        answer: "helping",
        info: "「てつだっている、助けている」は help に ing をつけた <b>helping</b> を使います。だれを助けているのか（an old woman）を後ろにくっつけよう！"
    }
];

let currentIdx = 0;

function loadQuestion() {
    const data = quizData[currentIdx];
    document.getElementById("icon").innerHTML = data.icon;
    document.getElementById("question-ja").innerHTML = data.ja;
    document.getElementById("question-en").innerHTML = data.en;
    
    const choicesContainer = document.getElementById("choices-container");
    choicesContainer.innerHTML = "";
    
    data.choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "btn";
        button.innerText = choice;
        button.onclick = () => checkAnswer(choice, button);
        choicesContainer.appendChild(button);
    });

    document.getElementById("feedback-box").style.display = "none";
    document.getElementById("next-button").style.display = "none";
}

function checkAnswer(selected, clickedButton) {
    const data = quizData[currentIdx];
    const feedbackBox = document.getElementById("feedback-box");
    const feedbackTitle = document.getElementById("feedback-title");
    const explanationText = document.getElementById("explanation-text");
    
    const buttons = document.querySelectorAll(".btn");
    buttons.forEach(btn => btn.disabled = true);

    if (selected === data.answer) {
        feedbackBox.className = "feedback correct";
        const goodWords = ["⭕ Good job!", "⭕ Great!", "⭕ Wonderful!", "⭕ You got it!"];
        feedbackTitle.innerText = goodWords[Math.floor(Math.random() * goodWords.length)];
        
        if(data.en.includes("？")) {
            document.getElementById("question-en").innerHTML = data.en.replace("？", `<span style="color:#2e7d32">${data.answer}</span>`);
        }
    } else {
        feedbackBox.className = "feedback incorrect";
        feedbackTitle.innerText = "❌ Oops! Try again!";
    }

    explanationText.innerHTML = data.info;
    feedbackBox.style.display = "block";
    document.getElementById("next-button").style.display = "block";
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < quizData.length) {
        loadQuestion();
    } else {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
    }
}

function resetQuiz() {
    currentIdx = 0;
    document.getElementById("quiz-screen").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
