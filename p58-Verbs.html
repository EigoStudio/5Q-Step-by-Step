<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step by Step Towards EIKEN Grade 5 p58 - More Verbs 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f6f0; /* 全体の背景（優しい薄いグリーン・ホワイト系） */
            --main-text: #2b2b2b; /* メインの文字（ダークグレー） */
            --box-bg: #ffffff; /* 問題カードの白 */
            --accent-yellow: #fff3cd; /* ヒントなどの薄いイエロー */
            --btn-green: #e2f0d9; /* 選択肢の薄いグリーン */
            --btn-hover: #c5e0b4; /* 選択肢ホバー */
            --brown-text: #7f6000; /* ブラウンの文字 */
        }

        body {
            font-family: 'Andika', 'Kosugi Maru', sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--box-bg);
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            border: 4px solid #d9e1f2;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            color: var(--brown-text);
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            border-bottom: 2px dashed var(--brown-text);
            padding-bottom: 12px;
        }

        /* 日本語と英語のバランス調整 */
        .ja-text {
            font-size: 19px;
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .en-text {
            font-size: 32px;
            font-weight: 700;
            color: #1f4e79;
            margin: 30px 0;
            text-align: center;
            letter-spacing: 1px;
        }

        .blank {
            color: #ffc000;
            border-bottom: 3px solid #ffc000;
            padding: 0 15px;
        }

        /* シンプルなアイコン風イラストのエリア */
        .icon-container {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
        }

        /* 選択肢ボタンエリア：横並び */
        .choices {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            background-color: var(--btn-green);
            border: 2px solid #a8d08d;
            border-radius: 14px;
            padding: 14px 30px;
            font-size: 24px;
            font-family: 'Andika', sans-serif;
            font-weight: bold;
            color: var(--main-text);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            flex: 1;
            min-width: 200px;
            max-width: 280px;
        }

        .btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-2px);
        }

        /* フィードバックエリア */
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 14px;
            display: none;
            font-size: 20px;
            font-weight: bold;
        }

        .correct {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .incorrect {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .explanation {
            font-size: 17px;
            font-weight: normal;
            margin-top: 12px;
            color: var(--main-text);
            line-height: 1.6;
        }

        /* 次へボタン */
        .next-btn {
            display: none;
            margin: 25px auto 0 auto;
            background-color: #fff2cc;
            border: 2px solid #ffd966;
            color: var(--brown-text);
            padding: 12px 40px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #ffe599;
        }

        /* 結果画面 */
        .result-screen {
            display: none;
            text-align: center;
        }

        .result-title {
            font-size: 32px;
            color: var(--brown-text);
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h1 id="title">Step by Step Towards EIKEN Grade 5 p58 - More Verbs 2</h1>
        
        <div class="icon-container" id="icon">🧹</div>

        <div class="ja-text" id="question-ja">
            お部屋がちょっと散らかっちゃった。<br>
            「部屋をきれいにおそうじする」という言葉を選ぼう！
        </div>

        <div class="en-text" id="question-en">
            I <span class="blank" id="blank-word">？</span> the room.
        </div>

        <div class="choices" id="choices-container">
            </div>

        <div class="feedback" id="feedback-box">
            <span id="feedback-title"></span>
            <div class="explanation" id="explanation-text"></div>
        </div>

        <button class="next-btn" id="next-button" onclick="nextQuestion()">NEXT ➔</button>
    </div>

    <div class="result-screen" id="result-screen">
        <div class="result-title">🎉 Perfect! Excellent job! 🎉</div>
        <div class="ja-text" style="text-align: center; font-size: 22px;">You did it! You are super awesome!</div>
        <button class="next-btn" style="display:inline-block; margin-top:25px;" onclick="resetQuiz()">TRY AGAIN</button>
    </div>
</div>

<script>
const quizData = [
    {
        icon: "🧹",
        ja: "お部屋がちょっと散らかっちゃった。<br>「部屋をきれいにおそうじする」という言葉を選ぼう！",
        en: "I <span class='blank'>？</span> the room.",
        choices: ["clean", "make", "buy"],
        answer: "clean",
        info: "「そうじする、きれいにする」は clean を使います。I clean the room. で「私は部屋をそうじします」になります。"
    },
    {
        icon: "🌧️",
        ja: "窓の外を見たら、あめの音がザーザー！<br>英語で「雨がふっている」っていうとき、さいしょに置く主語（しゅご）はどれかな？",
        en: "<span class='blank'>？</span> is raining.",
        choices: ["He", "It", "She"],
        answer: "It",
        info: "英語で「雨だよ」「晴れだよ」のように、お天気のハナシをするときは、いつも It を主語にする特別なルールがあります！"
    },
    {
        icon: "🍪",
        ja: "キッチンからいいにおい！オーブンでサクサクのクッキーを「作っている」ところだよ。<br>「〜を作る」という言葉を選んでね。",
        en: "I <span class='blank'>？</span> cookies.",
        choices: ["wear", "help", "make"],
        answer: "make",
        info: "「（何かを）作る」というときは make を使います。I make cookies. のように、後ろに「何を作っているのか（クッキー）」をはっきり書くのが英語のコツです。"
    },
   {
        icon: "👒",
        ja: "今日はお外がまぶしいから、かわいい帽子を「かぶって」お出かけしよう！<br>「身につける」という、とっても便利な言葉はどれ？",
        en: "I <span class='blank'>？</span> a hat.",
        choices: ["wear", "do", "water"],
        answer: "wear",
        info: "wear はとってもべんり！服を「着る」だけでなく、帽子を「かぶる」、スカートを「はく」、メガネを「かける」、イヤリングを「耳につける」ときも、ぜんぶ wear ひとつで言えちゃいます！"
    },
    {
        icon: "🌸",
        ja: "お庭のお花たちが、のどがかわいたって言っているよ。<br>お花に「お水をあげる」というときの言葉を選ぼう！",
        en: "I <span class='blank'>？</span> the flowers.",
        choices: ["clean", "water", "buy"],
        answer: "water",
        info: "water は「水」という意味だけでなく、じつは「水をあげる」という動きの言葉（動詞）にもなるんだよ！"
    },
    {
        icon: "✏️",
        ja: "学校から帰ってきたら、夕ごはんの前に「しゅくだい」をやっちゃおう！<br>「（自分の）宿題をやる」というお決まりのセットを選んでね。",
        en: "I <span class='blank'>？</span>.",
        choices: ["do my homework", "take a bath", "help an old woman"],
        answer: "do my homework",
        info: "「宿題をする」は do my homework と言います。英語では、だれの宿題かをはっきりさせるために「my（わたしの）」を間に入れるのがお約束です。"
    },
    {
        icon: "🛁",
        ja: "いっぱい遊んで、お風呂で足をのばしてリラックス！<br>「お風呂に入る（湯ぶねにつかる）」というお決まりのフレーズはどれかな？",
        en: "I <span class='blank'>？</span> every night.",
        choices: ["make cookies", "take a bath", "clean the room"],
        answer: "take a bath",
        info: "take a bath で「お風呂（湯ぶね）に入る」という意味になります。前回の「シャワーを浴びる（take a shower）」のきょうだいだね！"
    },
    {
        icon: "👛",
        ja: "お買い物にやってきたよ！お店で可愛いお財布（さいふ）を「買う」ことにしたよ。<br>「〜を買う」という言葉はどれかな？",
        en: "I <span class='blank'>？</span> a purse.",
        choices: ["buy", "wear", "it"],
        answer: "buy",
        info: "「買う」は buy を使います。I buy a purse. のように、後ろに「何を買ったのか（お財布）」をバシッと言いましょう。"
    },
    {
        icon: "👵",
        ja: "お荷物がいっぱいで大変そうなおばあちゃんがいるよ。優しく「てつだって（たすけて）」あげよう！<br>空欄に入る言葉はどれ？",
        en: "I <span class='blank'>？</span> an old woman.",
        choices: ["make", "help", "water"],
        answer: "help",
        info: "「てつだう、助ける」は help を使います。I help an old woman. のように、だれを助けたのかを後ろにくっつけて使います。"
    }
];

let currentIdx = 0;

function loadQuestion() {
    const data = quizData[currentIdx];
    document.getElementById("icon").innerHTML = data.icon;
    document.getElementById("question-ja").innerHTML = data.ja;
    document.getElementById("question-en").innerHTML = data.en;
    
    const choicesContainer = document.getElementById("choices-container");
    choicesContainer.innerHTML = "";
    
    data.choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "btn";
        button.innerText = choice;
        button.onclick = () => checkAnswer(choice, button);
        choicesContainer.appendChild(button);
    });

    document.getElementById("feedback-box").style.display = "none";
    document.getElementById("next-button").style.display = "none";
}

function checkAnswer(selected, clickedButton) {
    const data = quizData[currentIdx];
    const feedbackBox = document.getElementById("feedback-box");
    const feedbackTitle = document.getElementById("feedback-title");
    const explanationText = document.getElementById("explanation-text");
    
    const buttons = document.querySelectorAll(".btn");
    buttons.forEach(btn => btn.disabled = true);

    if (selected === data.answer) {
        feedbackBox.className = "feedback correct";
        const goodWords = ["⭕ Good job!", "⭕ Great!", "⭕ Wonderful!", "⭕ You got it!"];
        feedbackTitle.innerText = goodWords[Math.floor(Math.random() * goodWords.length)];
        
        if(data.en.includes("？")) {
            document.getElementById("question-en").innerHTML = data.en.replace("？", `<span style="color:#2e7d32">${data.answer}</span>`);
        }
    } else {
        feedbackBox.className = "feedback incorrect";
        feedbackTitle.innerText = "❌ Oops! Try again!";
    }

    explanationText.innerHTML = data.info;
    feedbackBox.style.display = "block";
    document.getElementById("next-button").style.display = "block";
}

function nextQuestion() {
    currentIdx++;
    if (currentIdx < quizData.length) {
        loadQuestion();
    } else {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result-screen").style.display = "block";
    }
}

function resetQuiz() {
    currentIdx = 0;
    document.getElementById("quiz-screen").style.display = "block";
    document.getElementById("result-screen").style.display = "none";
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
