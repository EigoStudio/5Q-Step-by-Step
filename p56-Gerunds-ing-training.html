<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>つくろう！動詞の -ing かたちトレーニング</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e3f2fd;
            --header-color: #1565c0;
            --accent-color: #ffb300;
            --text-dark: #212121;
            --white: #ffffff;
            --success-green: #4caf50;
            --error-red: #f44336;
            --base-font: 'Andika', "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            font-family: var(--base-font);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            /* 電子黒板のタッチパネルで強制的にスクロールを動かすための設定 */
            overflow-y: scroll !important;
            -webkit-overflow-scrolling: touch !important; 
            min-height: 100vh;
        }

        header {
            background-color: var(--header-color);
            color: var(--white);
            padding: 5px 15px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
        }

        .main-wrapper {
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            width: 98%;
            max-width: 1000px; 
            /* 縦幅の上限を大幅に下げて、超コンパクトにしました */
            min-height: 320px;
            max-height: 440px;
            background: var(--white);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            border: 5px solid var(--accent-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .step-indicator {
            font-size: 1.1rem;
            color: #555;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* 解説部分をより低重心に */
        .rule-box {
            background-color: #fff9c4;
            border: 2px dashed #fbc02d;
            border-radius: 10px;
            padding: 10px 15px;
            font-size: 1.15rem;
            line-height: 1.4;
            margin-bottom: 5px;
            text-align: left;
        }

        .rule-box h2 {
            margin: 0 0 3px 0;
            color: #e65100;
            font-size: 1.3rem;
        }

        .example-word {
            font-weight: bold;
            color: var(--header-color);
            font-size: 1.4rem;
            background: #e3f2fd;
            padding: 1px 6px;
            border-radius: 5px;
        }

        /* 問題エリア：縦に並んでいた要素を、横一列（フラット）にして高さを極限まで削減 */
        .question-area {
            flex: 1;
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0;
        }

        .word-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .target-word {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--header-color);
        }

        .meaning-text {
            font-size: 1.3rem;
            color: #616161;
            background: #f5f5f5;
            padding: 3px 10px;
            border-radius: 15px;
        }

        .typing-input {
            font-family: 'Andika', sans-serif;
            font-size: 2.2rem;
            width: 280px;
            padding: 5px;
            border: 3px solid #b0bec5;
            border-radius: 12px;
            text-align: center;
            outline: none;
        }

        .typing-input.correct { border-color: var(--success-green); background-color: #e8f5e9; }
        .typing-input.wrong { border-color: var(--error-red); background-color: #ffebee; animation: shake 0.3s; }

        .feedback-message {
            font-size: 1.5rem;
            font-weight: bold;
            width: 200px;
            text-align: left;
        }

        .btn {
            font-family: var(--base-font);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 25px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 3px 0 #bbb;
        }

        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #bbb; }
        .btn-primary { background-color: var(--header-color); color: white; box-shadow: 0 3px 0 #0d47a1; }
        .btn-accent { background-color: var(--accent-color); color: #333; box-shadow: 0 3px 0 #ff8f00; }

        .success-text { color: var(--success-green); }
        .error-text { color: var(--error-red); }

        /* 結果画面の省スペース化 */
        .score-display { font-size: 1.6rem; font-weight: bold; margin: 2px 0; }
        .score-num { font-size: 2.8rem; color: var(--header-color); }

        .result-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex: 1;
            margin-bottom: 5px;
            height: 200px;
        }

        .preview-box {
            background: #fafafa;
            border: 2px solid #cfd8dc;
            border-radius: 12px;
            padding: 10px;
            text-align: left;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .preview-title {
            font-weight: bold;
            color: var(--header-color);
            margin: 0 0 5px 0;
            font-size: 1rem;
        }

        .email-textarea {
            width: 100%;
            flex: 1;
            padding: 5px;
            border: 1px solid #b0bec5;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            resize: none;
        }

        .bottom-nav {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            flex-shrink: 0;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

<header>
    英検5級レベル 動詞の -ing かたちにチャレンジ！
</header>

<div class="main-wrapper">
    <div class="container" id="stage-container">
        </div>
</div>

<script>
const timeline = [
    // --- ルール 1 ---
    {
        type: 'rule',
        title: 'ルール①：そのままの形で <span style="color:#1565c0">-ing</span> をつける！',
        html: 'ほとんどの動詞は、なにも変えずにそのまま <span class="example-word">ing</span> をつければOK！ (例) jump &rarr; <span class="example-word">jumping</span>',
        bgWord: 'jump'
    },
    { type: 'question', word: 'play', meaning: 'あそぶ', correct: 'playing', ruleId: 1 },
    { type: 'question', word: 'read', meaning: 'よむ', correct: 'reading', ruleId: 1 },
    { type: 'question', word: 'cook', meaning: 'りょうりする', correct: 'cooking', ruleId: 1 },

    // --- ルール 2 ---
    {
        type: 'rule',
        title: 'ルール②：最後が <span style="color:#d32f2f">e</span> で終わる言葉は、<span style="color:#d32f2f">e</span> を消して <span style="color:#1565c0">-ing</span>！',
        html: 'さいごが <span class="example-word">e</span> でおわっている動詞は、<span style="color:red; font-weight:bold;">eを消してから</span> <span class="example-word">ing</span> をつけます。 (例) make &rarr; <span class="example-word">making</span>',
        bgWord: 'make'
    },
    { type: 'question', word: 'write', meaning: 'かく', correct: 'writing', ruleId: 2 },
    { type: 'question', word: 'dance', meaning: 'おどる', correct: 'dancing', ruleId: 2 },
    { type: 'question', word: 'use', meaning: 'つかう', correct: 'using', ruleId: 2 },

    // --- ルール 3 ---
    {
        type: 'rule',
        title: 'ルール③：最後が「みじかい母音 ＋ 子音」は、最後の文字をダブルにする！',
        html: '短く発音する母音のうしろに子音があるときは、<span style="color:red; font-weight:bold;">さいごの文字をもう1つ書いてから</span> <span class="example-word">ing</span>！ (例) run &rarr; <span class="example-word">running</span>',
        bgWord: 'run'
    },
    { type: 'question', word: 'swim', meaning: 'およぐ', correct: 'swimming', ruleId: 3 },
    { type: 'question', word: 'sit', meaning: 'すわる', correct: 'sitting', ruleId: 3 },
    { type: 'question', word: 'cut', meaning: 'きる', correct: 'cutting', ruleId: 3 },

    // --- ルール 4 ---
    {
        type: 'rule',
        title: 'ルール④：さいごが <span style="color:#d32f2f">w, x, y</span> のときは、重ねなくてOK！',
        html: '短く発音する言葉でも、さいごの文字が <span class="example-word">w</span>, <span class="example-word">x</span>, <span class="example-word">y</span> のときは、<span style="color:red; font-weight:bold;">かさねずにそのまま</span> <span class="example-word">ing</span>！ (例) draw &rarr; <span class="example-word">drawing</span>',
        bgWord: 'draw'
    },
    { type: 'question', word: 'snow', meaning: 'ゆきがふる', correct: 'snowing', ruleId: 4 },
    { type: 'question', word: 'fix', meaning: 'なおす', correct: 'fixing', ruleId: 4 },
    { type: 'question', word: 'buy', meaning: 'かう', correct: 'buying', ruleId: 4 },

    // --- 最終テスト ---
    {
        type: 'rule',
        title: 'さいごのしあげ：ミックス総合テスト！',
        html: 'これまでに習った4つのルールを思い出しながらチャレンジしよう！全12問！',
        bgWord: 'Ready?'
    },
    { type: 'question', word: 'sing', meaning: 'うたう', correct: 'singing', isTest: true },
    { type: 'question', word: 'have', meaning: 'もっている', correct: 'having', isTest: true },
    { type: 'question', word: 'hop', meaning: 'ジャンプする', correct: 'hopping', isTest: true },
    { type: 'question', word: 'enjoy', meaning: 'たのしむ', correct: 'enjoying', isTest: true },
    { type: 'question', word: 'come', meaning: 'くる', correct: 'coming', isTest: true },
    { type: 'question', word: 'run', meaning: 'はしる', correct: 'running', isTest: true },
    { type: 'question', word: 'clean', meaning: 'そうじする', correct: 'cleaning', isTest: true },
    { type: 'question', word: 'take', meaning: 'とる', correct: 'taking', isTest: true },
    { type: 'question', word: 'stop', meaning: 'とまる', correct: 'stopping', isTest: true },
    { type: 'question', word: 'show', meaning: 'みせる', correct: 'showing', isTest: true },
    { type: 'question', word: 'skate', meaning: 'スケートをする', correct: 'skating', isTest: true },
    { type: 'question', word: 'put', meaning: 'おく', correct: 'putting', isTest: true }
];

let currentIndex = 0;
let firstTryCorrectCount = 0; 
let testQuestionCount = 0;    
let isFirstTry = true;
let mistakes = [];

timeline.forEach(item => {
    if (item.type === 'question' && item.isTest) {
        testQuestionCount++;
    }
});

function renderStep() {
    const container = document.getElementById('stage-container');
    const current = timeline[currentIndex];

    if (!current) {
        showResult();
        return;
    }

    if (current.type === 'rule') {
        container.innerHTML = `
            <div>
                <div class="step-indicator">レクチャー / ルール説明</div>
                <div class="rule-box">
                    <h2>${current.title}</h2>
                    <div>${current.html}</div>
                </div>
            </div>
            <div class="bottom-nav" style="margin-top: 10px;">
                <button class="btn btn-accent" onclick="nextStep()">ルールがわかった！進む &rarr;</button>
            </div>
        `;
    } else if (current.type === 'question') {
        isFirstTry = true;
        const modeText = current.isTest ? "【テスト】" : `練習(ルール${current.ruleId})`;
        
        container.innerHTML = `
            <div>
                <div class="step-indicator" style="display:flex; justify-content:space-between;">
                    <span>${modeText}</span>
                    <span>しんちょく: ${currentIndex + 1} / ${timeline.length}</span>
                </div>
            </div>
            <div class="question-area">
                <div class="word-row">
                    <span class="target-word" id="q-word">${current.word}</span>
                    <span class="meaning-text">${current.meaning}</span>
                </div>
                <div>
                    <input type="text" class="typing-input" id="typing-ans" autocomplete="off" placeholder="入力してね" autofocus>
                </div>
                <div class="feedback-message" id="feedback"></div>
            </div>
            <div class="bottom-nav">
                <button class="btn btn-primary" id="submit-btn" onclick="checkAnswer()">こたえあわせ</button>
            </div>
        `;
        
        document.getElementById('typing-ans').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') { checkAnswer(); }
        });
    }
}

function nextStep() { currentIndex++; renderStep(); }

function checkAnswer() {
    const current = timeline[currentIndex];
    const inputEl = document.getElementById('typing-ans');
    const feedbackEl = document.getElementById('feedback');
    const userAnswer = inputEl.value.trim().toLowerCase();

    if (userAnswer === "") return;

    if (userAnswer === current.correct) {
        inputEl.className = "typing-input correct";
        feedbackEl.innerHTML = '<span class="success-text">Excellent! ✨</span>';
        if (current.isTest && isFirstTry) { firstTryCorrectCount++; }
        setTimeout(() => { currentIndex++; renderStep(); }, 1000);
    } else {
        inputEl.className = "typing-input wrong";
        feedbackEl.innerHTML = '<span class="error-text">Try again!</span>';
        if (isFirstTry) {
            const modeName = current.isTest ? "テスト" : `ルール${current.ruleId}`;
            mistakes.push({ word: current.word, correct: current.correct, mode: modeName });
            isFirstTry = false;
        }
        setTimeout(() => { inputEl.classList.remove('wrong'); }, 300);
    }
}

function generateEmailData() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = "【動詞のing形】トレーニング結果報告";
    let cleanMistakes = "";
    if (mistakes.length > 0) {
        cleanMistakes = mistakes.map(m => "・" + m.word + " (ただしい形: " + m.correct + " / " + m.mode + ")").join("\n");
    }
    let mistakeText = mistakes.length > 0 ? "\n\n■にがて・まちがえた単語リスト:\n" + cleanMistakes : "\n\nすべての練習・テストで一度も間違えずにクリアしました！カンペキです！";
    const body = "Tamaki先生へ\n\n「動詞の -ing かたちトレーニング」がおわりました！\n\n【ファイナルテストの結果】\n" + testQuestionCount + "問中 " + firstTryCorrectCount + " 問を一発正解できたよ！" + mistakeText + "\n\nこれからも英語の勉強をがんばります！";
    return { teacherEmail, subject, body };
}

function showResult() {
    const container = document.getElementById('stage-container');
    const emailData = generateEmailData();
    
    let mistakeHtml = '';
    if (mistakes.length > 0) {
        mistakeHtml = mistakes.map(m => `
            <div style="background:white; padding:5px 10px; border-radius:6px; border-left:4px solid var(--error-red); font-size:0.95rem; margin-bottom:5px;">
                <strong>${m.word}</strong> &rarr; <span style="color:var(--success-green); font-weight:bold;">${m.correct}</span>
            </div>
        `).join('');
    } else {
        mistakeHtml = `<div style="background:#e8f5e9; padding:10px; border-radius:8px; color:var(--success-green); text-align:center; font-weight:bold;">🎉 ぜんぶ一発正解！</div>`;
    }

    container.innerHTML = `
        <div style="text-align: center; width: 100%; display: flex; flex-direction: column;">
            <h2 style="font-size: 1.5rem; margin: 0; color: var(--header-color);">✨ トレーニング修了！お疲れ様でした ✨</h2>
            <div class="score-display">
                ファイナルテスト結果： <span class="score-num">${firstTryCorrectCount}</span> / ${testQuestionCount} 問 一発正解！
            </div>
            
            <div class="result-layout">
                <div class="preview-box">
                    <p class="preview-title" style="color:#c62828; margin:0 0 5px 0;">▼ もういちど 確認しよう！</p>
                    <div>${mistakeHtml}</div>
                </div>
                <div class="preview-box">
                    <p class="preview-title" style="margin:0 0 5px 0;">✉ 報告メールのプレビュー</p>
                    <textarea class="email-textarea" readonly>${emailData.body}</textarea>
                </div>
            </div>

            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 5px;">
                <button class="btn btn-primary" onclick="sendEmail()">Tamaki先生に報告する ✉</button>
                <button class="btn" style="background-color: #90a4ae; color: white;" onclick="resetQuiz()">もう一度挑戦</button>
            </div>
        </div>
    `;
}

function sendEmail() {
    const data = generateEmailData();
    window.location.href = "mailto:" + data.teacherEmail + "?subject=" + encodeURIComponent(data.subject) + "&body=" + encodeURIComponent(data.body);
}

function resetQuiz() { currentIndex = 0; firstTryCorrectCount = 0; mistakes = []; renderStep(); }

window.onload = renderStep;
</script>
</body>
</html>
