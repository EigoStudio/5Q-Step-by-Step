<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Where are they from?</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f7ff;
            --card-bg: #ffffff;
            --accent-blue: #0288d1;
            --accent-orange: #f57c00;
            --accent-green: #388e3c;
            --accent-red: #d32f2f;
            --text-main: #333;
            --main-font: "Zen Maru Gothic", sans-serif;
        }

        * { font-family: var(--main-font); box-sizing: border-box; }
        body { background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }

        .container {
            background: var(--card-bg); width: 100%; max-width: 900px; padding: 30px 25px 25px 25px;
            border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative;
        }

        .quiz-title {
            text-align: center; margin: -5px 0 20px 0; color: var(--accent-blue);
            font-size: 1.4rem; border-bottom: 2px dashed #bbdefb; padding-bottom: 10px;
        }

        .q-progress { position: absolute; top: 15px; right: 25px; font-weight: bold; color: #888; font-size: 0.9rem; }

        /* 240px固定だとスマホで画像が小さくなりすぎる場合があるため、
   max-heightを指定しつつアスペクト比を保ちやすくします */
.visual-area { 
    position: relative; 
    width: 100%; 
    height: 260px; /* 全体像を見せるために少し高くします */
    border-radius: 15px; 
    overflow: hidden; 
    margin-bottom: 20px; 
    background: #f8f8f8; /* 画像がない部分の背景色 */
    border: 1px solid #eee; /* 枠線を薄く入れると締まります */
}

.visual-area img { 
    width: 100%; 
    height: 100%; 
    /* cover から contain に変更：画像全体を表示します */
    object-fit: contain; 
    /* 画像を中央に配置 */
    object-position: center;
}
        .name-badge { 
            position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); 
            color: white; padding: 6px 18px; border-radius: 10px; font-size: 1.5rem; font-weight: bold;
        }

        .question-text { 
            font-size: 1.8rem; font-weight: bold; line-height: 1.6; margin-bottom: 25px; 
            text-align: left; display: flex; flex-wrap: wrap; align-items: baseline;
        }

        .sentence-unit { 
            display: inline-flex; 
            flex-wrap: wrap; 
            align-items: baseline; 
            margin-right: 30px; 
            white-space: pre;
        }

        /* 修正：文字切れを防ぐために高さを固定せず、paddingで調整 */
        select {
            appearance: none; background: #fff; border: 2px solid var(--accent-blue); border-radius: 8px;
            padding: 2px 10px; font-size: 1.8rem; font-weight: bold; color: var(--accent-blue); cursor: pointer; outline: none;
            transition: all 0.2s; margin: 0 4px; vertical-align: baseline; line-height: 1.2;
        }
        /* 正解後：枠を消し、文字が切れないようにpaddingを最小化 */
        select.correct-view { 
            border: none; background: transparent; padding: 0; pointer-events: none; margin: 0 4px; width: auto; color: var(--accent-blue); height: auto;
        }
        select.wrong { border-color: var(--accent-red); background-color: #ffebee; }

        .tap-blank {
            display: inline-block; min-width: 140px; border-bottom: 3px solid var(--accent-orange);
            color: var(--accent-orange); text-align: center; cursor: pointer; transition: all 0.2s;
            margin: 0 4px; font-size: 1.8rem; line-height: 1.2; vertical-align: baseline;
        }
        .tap-blank.active { border-color: var(--accent-blue); background: #e3f2fd; }
        .tap-blank.correct-view { 
            border: none; background: transparent; padding: 0; min-width: 0; margin: 0 4px; color: var(--accent-orange); font-weight: bold; 
        }
        .tap-blank.wrong { color: var(--accent-red); background-color: #ffebee; border-bottom-color: var(--accent-red); }

        .choices-row { display: flex; justify-content: space-between; gap: 15px; margin-top: 15px; }
        .choice-btn {
            flex: 1; background: white; border: 2px solid #ddd; padding: 14px 5px; border-radius: 15px;
            font-size: 1.3rem; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .choice-btn:hover { background: #f8f9fa; border-color: var(--accent-blue); }

        .feedback-msg { height: 40px; margin-top: 15px; font-weight: bold; font-size: 1.5rem; text-align: center; }

        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 10px; }
        .speak-btn {
            background: var(--accent-blue); color: white; border: none; width: 70px; height: 70px;
            border-radius: 50%; font-size: 2rem; cursor: pointer; display: none; box-shadow: 0 4px 0 #0056b3;
        }
        .speak-btn:active { transform: translateY(2px); box-shadow: none; }

        .btn-action {
            flex: 1; max-width: 450px; padding: 20px; font-size: 1.5rem; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; color: white;
        }
        .check-btn { background: var(--accent-green); box-shadow: 0 6px 0 #1b5e20; }
        .next-btn { background: var(--accent-orange); box-shadow: 0 6px 0 #e65100; display: none; }
        .btn-action:active { transform: translateY(3px); box-shadow: none; }

        #finish-screen { display: none; text-align: center; padding: 60px 0; }
        .celebration { font-size: 5rem; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h2 class="quiz-title">Where are they from? / What languages do they speak?</h2>
        <div class="q-progress" id="q-num">Question 1 / 10</div>
        
        <div class="visual-area">
            <img id="flag-img" src="" alt="scene">
            <div class="name-badge" id="person-name">Hibiki</div>
        </div>

        <div class="question-text" id="question-area"></div>
        <div class="choices-row" id="choices-area"></div>

        <div class="feedback-msg" id="feedback"></div>

        <div class="controls">
            <button class="speak-btn" id="speak-btn" onclick="playAudio()">🔊</button>
            <button class="btn-action check-btn" id="check-btn" onclick="handleCheck()">Check Answer</button>
            <button class="btn-action next-btn" id="next-btn" onclick="handleNext()">Next Question ➔</button>
        </div>
    </div>

    <div id="finish-screen">
        <span class="celebration">👑✨🎈</span>
        <h2>Congratulations!</h2>
        <p style="font-size: 1.6rem;">You've mastered countries and languages!</p>
        <button class="btn-action check-btn" onclick="location.reload()">最初からやり直す</button>
    </div>
</div>

<script>
    const quizData = [
        { name: "Hibiki", text: "I {be} from {c}.|I {v} {l} and English.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Japan", lAns:"Japanese", cLaps:["China","Chinese"], img:"japan.jpg", audio:"My name is Hibiki. I am from Japan. I speak Japanese and English." },
        { name: "Mr. Rossi", text: "He {be} from {c}.|He {v} {l}.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Italy", lAns:"Italian", cLaps:["France","French"], img:"italy.jpg", audio:"Mr. Rossi. He is from Italy. He speaks Italian." },
        { name: "Julian", text: "He {be} from {c}.|He {v} {l} and English.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Mexico", lAns:"Spanish", cLaps:["Italy","Italian"], img:"mexico.jpg", audio:"Julian. He is from Mexico. He speaks Spanish and English." },
        { name: "Kelly & Kathy", text: "They {be} from {c}.|They {v} {l}.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"America", lAns:"English", cLaps:["Canada","French"], img:"america.jpg", audio:"Kelly and Kathy. They are from America. They speak English." },
        { name: "Rosie", text: "She {be} from {c}.|She {v} English.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Australia", lAns:null, cLaps:["Germany","Canada"], img:"australia.jpg", audio:"Rosie. She is from Australia. She speaks English." },
        { name: "Lihn & Van", text: "They {be} from {c}.|They {v} {l} and English.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Vietnam", lAns:"Vietnamese", cLaps:["China","Thailand"], img:"vietnam.jpg", audio:"Lihn and Van. They are from Vietnam. They speak Vietnamese and English." },
        { name: "Fang", text: "She {be} from {c}.|She {v} {l}.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"China", lAns:"Chinese", cLaps:["Japan","Vietnam"], img:"china.jpg", audio:"Fang. She is from China. She speaks Chinese." },
        { name: "Oliver & Jack", text: "They {be} from {c}.|They {v} {l} and French.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Canada", lAns:"English", cLaps:["America","Spanish"], img:"canada.jpg", audio:"Oliver and Jack. They are from Canada. They speak English and French." },
        { name: "Hanna", text: "She {be} from {c}.|She {v} {l} and English.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"Germany", lAns:"German", cLaps:["France","Italy"], img:"germany.jpg", audio:"Hanna. She is from Germany. She speaks German and English." },
        { name: "Hugo", text: "He {be} from {c}.|He {v} {l}.", beOpt:["am","is","are"], vOpt:["speak","speaks"], cAns:"France", lAns:"French", cLaps:["Germany","Chinese"], img:"france.jpg", audio:"Hugo. He is from France. He speaks French." }
    ];

    let currentIdx = 0;
    let selectedC = "";
    let selectedL = "";
    let activeType = "c";

    function initQuestion() {
        const data = quizData[currentIdx];
        selectedC = ""; selectedL = ""; activeType = "c";
        
        document.getElementById('q-num').textContent = `Question ${currentIdx + 1} / ${quizData.length}`;
        document.getElementById('person-name').textContent = data.name;
        document.getElementById('flag-img').src = "images-countries/" + data.img;
        document.getElementById('feedback').textContent = "";
        
        const beSel = `<select id="be-sel"><option value="">--</option>${data.beOpt.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        const vSel = `<select id="v-sel"><option value="">--</option>${data.vOpt.map(o=>`<option value="${o}">${o}</option>`).join('')}</select>`;
        const cBlank = `<span id="c-blank" class="tap-blank active" onclick="setActive('c')">____</span>`;
        const lBlank = data.lAns ? `<span id="l-blank" class="tap-blank" onclick="setActive('l')">____</span>` : "";

        const sentences = data.text.split('|');
        let html = `<span class="sentence-unit">${sentences[0].replace('{be}', beSel).replace('{c}', cBlank)}</span> `;
        html += `<span class="sentence-unit">${sentences[1].replace('{v}', vSel).replace('{l}', lBlank || "")}</span>`;

        document.getElementById('question-area').innerHTML = html;

        let opts = [data.cAns];
        if(data.lAns) opts.push(data.lAns);
        data.cLaps.forEach(o => { if(opts.length < 4) opts.push(o); });
        opts.sort(() => Math.random() - 0.5);

        document.getElementById('choices-area').innerHTML = opts.map(o => 
            `<button class="choice-btn" onclick="selectWord('${o}')">${o}</button>`
        ).join('');

        document.getElementById('speak-btn').style.display = 'none';
        document.getElementById('check-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
    }

    function setActive(t) {
        if(document.getElementById('next-btn').style.display === 'block') return;
        activeType = t;
        document.querySelectorAll('.tap-blank').forEach(b => b.classList.remove('active'));
        document.getElementById(t + '-blank').classList.add('active');
    }

    function selectWord(w) {
        if(activeType === 'c') {
            selectedC = w;
            document.getElementById('c-blank').textContent = w;
        } else {
            selectedL = w;
            document.getElementById('l-blank').textContent = w;
        }
    }

    function handleCheck() {
        const data = quizData[currentIdx];
        const beS = document.getElementById('be-sel');
        const vS = document.getElementById('v-sel');
        const cB = document.getElementById('c-blank');
        const lB = document.getElementById('l-blank');

        if(!beS.value || !vS.value || !selectedC || (data.lAns && !selectedL)) {
            alert("Empty slots! 全部の空欄をうめてね。"); return;
        }

        const beCorrect = (currentIdx === 0) ? "am" : (data.name.includes("&") ? "are" : "is");
        const vCorrect = (data.name.includes("&") || currentIdx === 0) ? "speak" : "speaks";

        const isBeOk = beS.value === beCorrect;
        const isVOk = vS.value === vCorrect;
        const isCOk = selectedC === data.cAns;
        const isLOk = lB ? (selectedL === data.lAns) : true;

        if(isBeOk && isVOk && isCOk && isLOk) {
            beS.className = "correct-view";
            vS.className = "correct-view";
            cB.className = "tap-blank correct-view";
            if(lB) lB.className = "tap-blank correct-view";
            
            document.getElementById('feedback').innerHTML = "<span style='color:var(--accent-green)'>Excellent! ✨ Perfect!</span>";
            document.getElementById('check-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('speak-btn').style.display = 'block';
        } else {
            beS.classList.toggle('wrong', !isBeOk);
            vS.classList.toggle('wrong', !isVOk);
            cB.classList.toggle('wrong', !isCOk);
            if(lB) lB.classList.toggle('wrong', !isLOk);
            document.getElementById('feedback').innerHTML = "<span style='color:var(--accent-red)'>Try again! You can do it! 💪</span>";
        }
    }

    function playAudio() {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(quizData[currentIdx].audio);
        uttr.lang = 'en-US';
        uttr.rate = 0.8;
        window.speechSynthesis.speak(uttr);
    }

    function handleNext() {
        currentIdx++;
        if (currentIdx < quizData.length) initQuestion();
        else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('finish-screen').style.display = 'block';
        }
    }

    initQuestion();
</script>
</body>
</html>
