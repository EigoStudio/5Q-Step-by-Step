<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Step by Step Towards EIKEN Grade 5 p40 Adjectives 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Andika:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f1f8e9;
            --header-gray: #455a64;
            --accent-yellow: #fdd835;
            --text-dark: #263238;
            --white: #ffffff;
            --error-red: #ff5252;
            --success-green: #4caf50;
            --base-font: 'Andika', "Hiragino Maru Gothic ProN", "Hiragino Maru Gothic Pro", "Yu Gothic", "Meiryo", sans-serif;
        }

        body {
            font-family: var(--base-font);
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--header-gray);
            color: var(--white);
            width: 100%;
            padding: 15px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 600px;
            width: 90%;
            margin: 20px 0;
            background: var(--white);
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            text-align: center;
            border: 5px solid var(--accent-yellow);
        }

        .progress-bar { font-size: 1.1rem; color: var(--header-gray); margin-bottom: 15px; font-weight: bold; }
        
        .word-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 10px 0 30px 0;
        }

        .word-display { 
            font-size: 4.5rem; 
            font-weight: 700; 
            color: var(--header-gray); 
            letter-spacing: 2px;
            margin: 0;
        }

        .speaker-btn {
            background: #e1f5fe;
            border: 2px solid #03a9f4;
            color: #03a9f4;
            font-size: 2rem;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            box-shadow: 0 4px 0 #0288d1;
        }
        .speaker-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0288d1;
        }

        .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .choice-btn {
            background: var(--white);
            border: 3px solid var(--header-gray);
            border-radius: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--header-gray);
            font-family: var(--base-font);
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0 10px;
        }

        ruby { ruby-position: over; }
        rt { font-size: 0.55em; font-weight: normal; color: #546e7a; }

        .choice-btn:hover { background-color: #eceff1; transform: scale(1.02); }
        .choice-btn.wrong { background-color: #ffebee; border-color: var(--error-red); color: var(--error-red); animation: shake 0.3s; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }

        #result-screen { display: none; }
        .score-num { font-size: 4rem; color: var(--header-gray); font-weight: 700; }
        .mistake-list { text-align: left; background: #fafafa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #cfd8dc; }
        .mistake-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }

        .action-btn { 
            background-color: var(--header-gray); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 40px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            width: 100%;
            font-family: var(--base-font);
        }
    </style>
</head>
<body>

<header>
    <h1 style="font-size: 1.2rem;">Step by Step Towards EIKEN Grade 5 p40 Adjectives 2</h1>
</header>

<div class="container" id="quiz-screen">
    <div class="progress-bar" id="progress">1 / 16</div>
    <div class="word-area">
        <div class="word-display" id="word-text">Loading...</div>
        <button class="speaker-btn" onclick="speakCurrentWord()">🔊</button>
    </div>
    <div class="choices-grid" id="choices-container"></div>
    <div id="feedback" style="margin-top:20px; height: 1.2em; font-weight: bold; font-size: 1.3rem;"></div>
</div>

<div class="container" id="result-screen">
    <h2 style="font-size: 1.8rem;">トレーニング終了！</h2>
    <div style="font-size: 1.2rem;">正解数：<span class="score-num" id="final-score">0</span> / 16</div>
    <div id="mistake-container" style="display:none;">
        <h3 style="color: var(--header-gray); margin-top:25px;">もういちど 確認しよう！</h3>
        <div class="mistake-list" id="mistake-list"></div>
    </div>
    <button class="action-btn" onclick="sendEmail()">Tamaki先生に報告する</button>
    <button class="action-btn" style="background-color: #90a4ae;" onclick="location.reload()">もう一度やる</button>
</div>

<script>
function speak(txt, rate = 0.7) {
    window.speechSynthesis.cancel();
    let u = new SpeechSynthesisUtterance(txt);
    u.lang = "en-US"; 
    u.rate = rate;
    window.speechSynthesis.speak(u);
}

function speakCurrentWord() {
    const word = document.getElementById('word-text').textContent;
    speak(word);
}

const quizData = [
    {w:"beautiful", a:"<ruby>美<rt>うつく</rt></ruby>しい", c:["かわいい", "新しい", "古い"]},
    {w:"cute", a:"かわいい", c:["小さい", "短い", "古い"]},
    {w:"easy", a:"簡単な", c:["有名な", "大切な", "危険な"]},
    {w:"favorite", a:"お気に入りの・大好きな", c:["有名な・大切な", "元気な・親切な", "静かな・広い"]},
    {w:"final", a:"<ruby>最<rt>さい</rt></ruby>後の", c:["最初の", "次の", "新しい"]},
    {w:"fun", a:"楽しい", c:["悲しい", "眠い", "忙しい"]},
    {w:"great", a:"すばらしい", c:["悪い", "古い", "遅い"]},
    {w:"kind", a:"<ruby>親<rt>しん</rt></ruby>切な", c:["有名な", "特別な", "元気な"]},
    {w:"last", a:"この前の・最後の", c:["次の・最初の", "新しい・古い", "右の・左の"]},
    {w:"next", a:"次の", c:["この前の", "古い", "短い"]},
    {w:"new", a:"新しい", c:["古い", "大きい", "いい"]},
    {w:"old", a:"古い・年をとった", c:["新しい・若い", "小さい・低い", "短い・遅い"]},
    {w:"ready", a:"準備ができて", c:["疲れていて", "忙しくて", "眠くて"]},
    {w:"right", a:"正しい", c:["悪い", "遅い", "短い"]},
    {w:"sweet", a:"<ruby>甘<rt>あま</rt></ruby>い", c:["辛い", "苦い", "酸っぱい"]},
    {w:"tired", a:"<ruby>疲<rt>つか</rt></ruby>れた", c:["眠い", "忙しい", "若い"]}
];

let quizQueue = [...quizData].sort(() => Math.random() - 0.5);
let currentIndex = 0;
let firstTryCorrectCount = 0;
let isFirstTry = true;
let mistakes = [];

function loadQuestion() {
    const current = quizQueue[currentIndex];
    document.getElementById('progress').textContent = `${currentIndex + 1} / ${quizQueue.length}`;
    document.getElementById('word-text').textContent = current.w;
    document.getElementById('feedback').textContent = "";
    
    const container = document.getElementById('choices-container');
    container.innerHTML = '';
    isFirstTry = true;

    const choices = [current.a, ...current.c].sort(() => Math.random() - 0.5);

    choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = choice;
        btn.onclick = () => checkAnswer(choice, current.a, btn);
        container.appendChild(btn);
    });
}

function checkAnswer(selected, correct, btn) {
    if (selected === correct) {
        if (isFirstTry) { firstTryCorrectCount++; }
        document.getElementById('feedback').style.color = "var(--success-green)";
        document.getElementById('feedback').textContent = "Excellent! ✨";
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < quizQueue.length) { loadQuestion(); } else { showResult(); }
        }, 600);
    } else {
        if (isFirstTry) {
            mistakes.push({w: quizQueue[currentIndex].w, a: quizQueue[currentIndex].a});
            isFirstTry = false;
        }
        btn.classList.add('wrong');
        document.getElementById('feedback').style.color = "var(--error-red)";
        document.getElementById('feedback').textContent = "Try again!";
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').textContent = firstTryCorrectCount;
    if (mistakes.length > 0) {
        document.getElementById('mistake-container').style.display = 'block';
        document.getElementById('mistake-list').innerHTML = mistakes.map(m => `
            <div class="mistake-item"><strong>${m.w}</strong><span>${m.a.replace(/<[^>]*>?/gm, '')}</span></div>
        `).join('');
    }
}

function sendEmail() {
    const teacherEmail = "tamaki@eigostudio-stepforward.com";
    const subject = encodeURIComponent("Step by Step p40 Adjectives 2 学習結果");
    const cleanMistakes = mistakes.map(m => `・${m.w} (${m.a.replace(/<[^>]*>?/gm, '')})`).join("\n");
    let mistakeText = mistakes.length > 0 ? "\n\n■要復習リスト:\n" + cleanMistakes : "\n\nすべて一発正解でした！すばらしい！";
    const body = encodeURIComponent(`Tamaki先生へ\n\n「Step by Step Towards EIKEN Grade 5 p40 Adjectives 2」のトレーニングを完了しました！\n\n結果: ${quizQueue.length}問中 ${firstTryCorrectCount} 問を一発正解。${mistakeText}`);
    window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
}

window.onload = loadQuestion;
</script>
</body>
</html>
