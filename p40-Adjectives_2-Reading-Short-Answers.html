            --text-color: #3e2723;

        * {

        body {

            color: var(--text-color);

            min-height: 100vh;
        }

        .container {

            width: 100%; 
        }

        header {

        }

        h1 { 
            color: var(--primary-green); 
            font-size: 1.6rem;

        }

        .score-counter {
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #455a64; 
            text-align: center;

        }

        .progress-bar {
            width: 100%; 
            height: 12px;

            border-radius: 6px;

        }

        .progress-fill {

            background: var(--card-bg);

            display: none;

        }

            margin-bottom: 25px;

            line-height: 1.6;

            border-right: 1px solid var(--gray-border); 
            border-bottom: 1px solid var(--gray-border);

        }

        .situation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .q-title {

            background-color: #e2e8f0;

            border-radius: 10px;

            margin-bottom: 15px;

            color: #455a64;
        }

        .question-text {
            font-size: 1.5rem; 
            font-weight: bold; 
            color: var(--primary-green);
            text-align: center; 
            line-height: 1.6; 
            margin-bottom: 25px;
            background: #f1f8e9; 
            padding: 15px; 
            border-radius: 15px;
            border: 2px dashed var(--primary-green);
        }

        /* Responsive choices layout */
        .choices-grid {
            display: flex; 
            flex-direction: row; 
            gap: 12px; 
            margin-bottom: 25px; 
            justify-content: center; 
            flex-wrap: wrap;
        }

        .choice-btn {
            background-color: #ffffff; 
            border: 2px solid var(--gray-border);
            padding: 14px 10px; 
            border-radius: 30px; 
            cursor: pointer;
            font-weight: bold; 
            font-size: 1.15rem; 
            color: var(--text-color);
            text-align: center;

            line-height: 1.4; 
            flex: 1; 
            min-width: 150px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
        }

        .choice-btn:hover { 
            background-color: var(--gray-light); 
            border-color: #b0bec5; 
        }

        .choice-btn:active { 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 var(--gray-border); 
        }
        
        .choice-btn.correct {

            color: var(--primary-green) !important;

            color: #8d6e63 !important; 
            box-shadow: 0 4px 0 #d7ccc8 !important;

            font-size: 1.2rem;

        #excellentPopup.show {

        /* Speaker Button styling matching user's templates */
        .speak-btn {
            background: var(--accent-brown);
            color: white;

            padding: 8px 16px;
            border-radius: 20px;

            align-items: center;

            box-shadow: 0 3px 0 #1b5e20;

        }

        @keyframes softPulse {
            0%, 100% { opacity: 1; }

        /* Custom kid-friendly modal to replace native alert() */
        #customAlertModal {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.4);

            align-items: center;
            justify-content: center;

            z-index: 2000;

            margin-bottom: 10px;
        }

            font-size: 1.4rem;

            font-size: 1.1rem;

            box-shadow: 0 4px 0 #5d4037;

            box-shadow: none;

    // Sound engine using web audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(type) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // D5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start();
            osc.frequency.setValueAtTime(880.00, audioCtx.currentTime + 0.1); // A5
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
            osc.stop(audioCtx.currentTime + 0.35);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220.00, audioCtx.currentTime); // A3
            osc.frequency.linearRampToValueAtTime(110.00, audioCtx.currentTime + 0.3); // A2
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.3);
        }
    }

    let currentIdx = 0;
    let firstTryCorrectCount = 0;
    let isFirstTry = true;
    let mistakes = [];
    const container = document.getElementById('quiz-container');

    // TTS Voice Config
    let preferredVoice = null;

    function loadVoices() {
        if (typeof speechSynthesis === 'undefined') return;
        const voices = speechSynthesis.getVoices();
        
        // Find slower, friendly American female voice
        preferredVoice = 
            voices.find(v => v.lang === "en-US" && v.name.includes("Google US English")) ||
            voices.find(v => v.lang === "en-US" && v.name.includes("Samantha")) ||
            voices.find(v => v.lang.startsWith("en-US") && (v.name.includes("Female") || v.name.includes("Zira"))) ||
            voices.find(v => v.lang.startsWith("en"));
    }

    if (typeof speechSynthesis !== 'undefined') {
        speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();
    }

    // TTS Action using indexes to avoid string escaping glitches
    function speakText(idx, btnId) {
        if (typeof speechSynthesis === 'undefined') return;

        if (speechSynthesis.speaking) {
            speechSynthesis.cancel();
            resetSpeakButtons();
            return;
        }

        const rawText = quizData[idx].situation;
        // Strip quotation marks cleanly for speech synthesis
        const speakableText = rawText.replace(/[\"\']/g, "");

        const utterance = new SpeechSynthesisUtterance(speakableText);
        if (preferredVoice) {
            utterance.voice = preferredVoice;
        }
        
        // Soft, young-paced slow audio configuration (0.78x speed)
        utterance.rate = 0.78; 
        utterance.pitch = 1.15; 

        const button = document.getElementById(btnId);
        
        utterance.onstart = () => {
            button.classList.add('speaking');
            button.innerHTML = `🔊 Speaking...`;
        };

        utterance.onend = () => {
            button.classList.remove('speaking');
            button.innerHTML = `🔊 Read Story (Slow)`;
        };

        utterance.onerror = () => {
            button.classList.remove('speaking');
            button.innerHTML = `🔊 Read Story (Slow)`;
        };

        speechSynthesis.speak(utterance);
    }

    function resetSpeakButtons() {
        const buttons = document.querySelectorAll('.speak-btn');
        buttons.forEach(button => {
            button.classList.remove('speaking');
            button.innerHTML = `🔊 Read Story (Slow)`;
        });
    }

    function stopSpeaking() {
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.speaking) {
            speechSynthesis.cancel();
        }
        resetSpeakButtons();
    }

    function shuffleOptions(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initApp() {
        quizData.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = `card ${idx === 0 ? 'active' : ''}`;
            card.id = `card-${idx}`;

            let randomizedOptions = [...q.options];
            shuffleOptions(randomizedOptions);

            let choicesHtml = '';
            randomizedOptions.forEach(o => {
                choicesHtml += `<button class="choice-btn" onclick="selectOption(this, ${o.correct}, ${idx})">${o.text}</button>`;
            });

            card.innerHTML = `
                <div class="q-title">${q.title}</div>
                
                <div class="situation-display">
                    <div class="situation-header">
                        <span>📖 Situation:</span>
                        <button id="speak-btn-${idx}" class="speak-btn" onclick="speakText(${idx}, 'speak-btn-${idx}')">
                            🔊 Read Story (Slow)
                        </button>
                    </div>
                    ${q.situation}
                </div>

                <div class="question-text">${q.question}</div>
                <div class="choices-grid">${choicesHtml}</div>
                <div class="action-nav">
                    <button class="action-btn next-btn" id="next-${idx}" onclick="goNext(${idx})">Next Step ➔</button>
                </div>
            `;
            container.appendChild(card);
        });
        updateProgressBar(0);
    }

    function selectOption(btn, isCorrect, idx) {
        const card = document.getElementById(`card-${idx}`);
        const buttons = card.querySelectorAll('.choice-btn');
        const nextBtn = document.getElementById(`next-${idx}`);

        if (isCorrect) {
            playSound('correct');
            btn.classList.add('correct');
            showExcellent();
            
            if (isFirstTry) {
                firstTryCorrectCount++;
                document.getElementById('currentScore').textContent = firstTryCorrectCount;
            }

            buttons.forEach(b => {
                b.disabled = true;
                b.classList.add('disabled');
                if(b !== btn) b.style.opacity = "0.4";
            });

            nextBtn.style.display = 'inline-block';
        } else {
            playSound('wrong');
            btn.classList.add('wrong');
            
            if (isFirstTry) {
                mistakes.push({ q: quizData[idx].question, s: quizData[idx].title });
                isFirstTry = false;
            }
            openCustomAlert(quizData[idx].hint);
        }
    }

    // Custom Alert Operations
    function openCustomAlert(text) {
        document.getElementById('customAlertMessage').innerHTML = text + "<br><br>Let's check the story again!";
        document.getElementById('customAlertModal').classList.add('show');
    }

    function closeCustomAlert() {
        document.getElementById('customAlertModal').classList.remove('show');
    }

    function showExcellent() {
        const popup = document.getElementById('excellentPopup');
        popup.classList.add('show');
        setTimeout(() => popup.classList.remove('show'), 1200);
    }

    function updateProgressBar(step) {
        const percentage = (step / quizData.length) * 100;
        document.getElementById('progressFill').style.width = percentage + '%';
    }

    function goNext(current) {
        stopSpeaking();
        document.getElementById(`card-${current}`).classList.remove('active');
        currentIdx++;
        isFirstTry = true;
        
        if (currentIdx < quizData.length) {
            document.getElementById(`card-${currentIdx}`).classList.add('active');
            updateProgressBar(currentIdx);
        } else {
            updateProgressBar(quizData.length);
            showResultScreen();
        }
    }

    function showResultScreen() {
        document.getElementById('card-result').classList.add('active');
        document.getElementById('finalScore').textContent = firstTryCorrectCount;
        
        if (mistakes.length > 0) {
            document.getElementById('mistake-container').style.display = 'block';
            const list = document.getElementById('mistake-list');
            list.innerHTML = mistakes.map(m => `
                <div class="mistake-item"><strong>[${m.s}]</strong> ${m.q}</div>
            `).join('');
        }
    }

    function sendEmail() {
        const teacherEmail = "tamaki@eigostudio-stepforward.com";
        const subject = encodeURIComponent("EIKEN Grade 5 p40 Adjectives Result");
        
        const cleanMistakes = mistakes.map(m => `・${m.s}: ${m.q}`).join("\n");
        let mistakeText = mistakes.length > 0 ? "\n\n■ Review Needed:\n" + cleanMistakes : "\n\nPerfect score on first tries!";
        
        const body = encodeURIComponent(`Dear Tamaki-sensei,\n\nI have finished the "Cinderella Adjectives & Short Answers p40" quiz!\n\nScore: ${firstTryCorrectCount} / ${quizData.length} (First-try correct)${mistakeText}\n\nThank you!`);
        
        window.location.href = `mailto:${teacherEmail}?subject=${subject}&body=${body}`;
    }

    window.addEventListener('DOMContentLoaded', () => {
        initApp();
        if (typeof speechSynthesis !== 'undefined' && speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
    });
</script>
</body>
</html>
